<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sprinkled Cupcakes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script>
      const setGameHeight = () => {
        const height = window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight;
        document.documentElement.style.setProperty("--game-height", `${height}px`);
      };

      setGameHeight();
      window.addEventListener("resize", setGameHeight);
      window.addEventListener("orientationchange", () => window.setTimeout(setGameHeight, 250));
      window.visualViewport?.addEventListener("resize", setGameHeight);
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="game-wrap" aria-label="Sprinkled Cupcakes Phaser game">
        <div id="game"></div>
      </section>
    </main>
    <div class="rotate-hint">Turn your phone sideways for the best view.</div>
    <script src="./src/game.js"></script>
  </body>
</html>
